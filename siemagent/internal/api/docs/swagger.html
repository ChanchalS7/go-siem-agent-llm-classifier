<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SIEMAgent API Docs</title>
  <link rel="stylesheet"
    href="https://unpkg.com/swagger-ui-dist@5.18.2/swagger-ui.css" />
  <style>
    /* dark chrome */
    body { margin: 0; background: #0f172a; }
    .swagger-ui .topbar { background: #1e293b; padding: 8px 20px; }
    .swagger-ui .topbar .download-url-wrapper { display: none; }
    .swagger-ui .topbar-wrapper img { content: none; }
    .swagger-ui .topbar-wrapper::before {
      content: "🛡️  SIEMAgent API";
      color: #e2e8f0;
      font-size: 18px;
      font-weight: 700;
      font-family: system-ui, sans-serif;
    }
    /* tighten up info section */
    .swagger-ui .info { margin: 20px 0 0; }
  </style>
</head>
<body>
  <div id="swagger-ui"></div>
  <script src="https://unpkg.com/swagger-ui-dist@5.18.2/swagger-ui-bundle.js"></script>
  <script src="https://unpkg.com/swagger-ui-dist@5.18.2/swagger-ui-standalone-preset.js"></script>
  <script>
    window.onload = () => {
      SwaggerUIBundle({
        url: "/docs/openapi.yaml",
        dom_id: "#swagger-ui",
        presets: [SwaggerUIBundle.presets.apis, SwaggerUIStandalonePreset],
        layout: "StandaloneLayout",
        deepLinking: true,
        displayRequestDuration: true,
        defaultModelsExpandDepth: 2,
        defaultModelExpandDepth: 3,
        tryItOutEnabled: true,
        requestInterceptor: (req) => {
          // Strip trailing slash so Chi routes match exactly.
          req.url = req.url.replace(/\/$/, "");
          return req;
        },
      });
    };
  </script>
</body>
</html>
